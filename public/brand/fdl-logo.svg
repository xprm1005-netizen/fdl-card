<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- Soccer ball circle base -->
  <circle cx="150" cy="120" r="105" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Soccer ball pentagon/hexagon patches -->
  <!-- Center top - dark gray -->
  <polygon points="150,30 168,44 161,65 139,65 132,44" fill="#666"/>

  <!-- Upper left - teal -->
  <polygon points="132,44 139,65 116,73 98,58 106,37" fill="#3DBFBF"/>
  <!-- Left - teal lighter -->
  <polygon points="98,58 116,73 110,96 86,97 78,74" fill="#4ED8C8"/>
  <!-- Far left - teal dark -->
  <polygon points="78,74 86,97 70,115 50,105 52,80" fill="#2AACAC"/>

  <!-- Upper right - purple/lavender -->
  <polygon points="168,44 190,44 196,67 177,78 161,65" fill="#8B89CC"/>
  <!-- Right upper - medium blue-purple -->
  <polygon points="190,44 210,58 208,83 190,90 177,78" fill="#6B7CC4"/>

  <!-- Center - dark blue-gray -->
  <polygon points="116,73 139,65 161,65 177,78 168,100 148,107 126,100 110,96" fill="#5B6DB5"/>

  <!-- Lower left -->
  <polygon points="86,97 110,96 126,100 120,123 97,128 78,113" fill="#4A9EBF"/>
  <!-- Lower center-left - purple -->
  <polygon points="126,100 148,107 145,132 122,137 97,128 120,123" fill="#7B5EA7"/>
  <!-- Lower center - medium purple -->
  <polygon points="148,107 168,100 180,115 174,137 145,132" fill="#8B5CF6"/>
  <!-- Lower right - dark purple -->
  <polygon points="168,100 190,90 208,100 205,125 180,130 174,137 180,115" fill="#6D4C9E"/>

  <!-- Lower bottom -->
  <polygon points="97,128 122,137 118,155 95,158 75,143 78,113" fill="#3A8FA8"/>
  <polygon points="122,137 145,132 148,158 125,165 98,158 118,155" fill="#6B4E9E"/>
  <polygon points="145,132 174,137 172,162 148,168 125,165 148,158" fill="#7B5CF0"/>
  <polygon points="174,137 205,125 215,145 200,165 172,162" fill="#5B4A8E"/>

  <!-- Bar chart on right side (overlapping ball area) -->
  <rect x="205" y="105" width="18" height="35" rx="3" fill="#9EA8C4" opacity="0.9"/>
  <rect x="227" y="90" width="18" height="50" rx="3" fill="#7B8DB5" opacity="0.9"/>
  <rect x="249" y="75" width="18" height="65" rx="3" fill="#6675A8" opacity="0.9"/>
  <rect x="227" y="143" width="40" height="3" rx="1" fill="#8895B8" opacity="0.7"/>

  <!-- Gray accent triangle/shape top right of ball -->
  <polygon points="190,44 210,30 225,52 210,58" fill="#AAAAAA"/>

  <!-- Text: FOOTBALL -->
  <text x="150" y="252" font-family="Arial Black, Arial, sans-serif" font-weight="800" font-size="32" fill="#1A1A1A" text-anchor="middle" letter-spacing="6">FOOTBALL</text>
  <!-- Text: DATA LAB -->
  <text x="150" y="295" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" fill="#1A1A1A" text-anchor="middle" letter-spacing="4">DATA LAB</text>
</svg>
